<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlowDesk – CRM Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #09090B; font-family: 'DM Sans', 'Segoe UI', sans-serif; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    input:focus { outline: none; border-color: rgba(99,102,241,0.6) !important; box-shadow: 0 0 0 3px rgba(99,102,241,0.12); }
    button { cursor: pointer; }
    tr:hover td { background: rgba(255,255,255,0.015); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, createContext, useContext } = React;

/* ─── DEMO DATA ─────────────────────────────────────── */
const DEMO_USERS = [
  { id:1, email:'admin@demo.com',   password:'password123', name:'Admin User',    role:'admin'   },
  { id:2, email:'manager@demo.com', password:'password123', name:'John Manager',  role:'manager' },
  { id:3, email:'user@demo.com',    password:'password123', name:'Jane Doe',      role:'user'    },
];

const DASHBOARD_DATA = {
  stats: { totalLeads:6, openTasks:5, activeUsers:4, totalRevenue:'$98,250' },
  leads: [
    { id:1, name:'Acme Corporation',   email:'contact@acme.com',       status:'New',         value:'$12,500', source:'Website',    date:'2024-01-15' },
    { id:2, name:'TechVentures Inc',   email:'info@techventures.io',   status:'Qualified',   value:'$8,200',  source:'Referral',   date:'2024-01-14' },
    { id:3, name:'Global Retail Group',email:'sales@globalretail.com', status:'Proposal',    value:'$34,000', source:'Cold Email', date:'2024-01-13' },
    { id:4, name:'StartupHub',         email:'hello@startuphub.dev',   status:'Negotiation', value:'$6,800',  source:'LinkedIn',   date:'2024-01-12' },
    { id:5, name:'BlueWave Solutions', email:'bd@bluewave.co',         status:'Closed Won',  value:'$21,000', source:'Conference', date:'2024-01-10' },
    { id:6, name:'Meridian Partners',  email:'team@meridian.com',      status:'New',         value:'$15,750', source:'Website',    date:'2024-01-09' },
  ],
  tasks: [
    { id:1, title:'Follow up with Acme Corporation',    assignee:'Sarah Johnson', priority:'High',   status:'In Progress', due:'2024-01-20' },
    { id:2, title:'Prepare Q1 sales report',            assignee:'Michael Chen',  priority:'Medium', status:'Todo',        due:'2024-01-25' },
    { id:3, title:'Demo call with TechVentures',        assignee:'Emma Davis',    priority:'High',   status:'Todo',        due:'2024-01-18' },
    { id:4, title:'Update CRM pipeline',                assignee:'James Wilson',  priority:'Low',    status:'Completed',   due:'2024-01-15' },
    { id:5, title:'Review BlueWave contract',           assignee:'Sarah Johnson', priority:'High',   status:'In Progress', due:'2024-01-19' },
    { id:6, title:'Send onboarding docs to Meridian',   assignee:'Michael Chen',  priority:'Medium', status:'Todo',        due:'2024-01-22' },
  ],
  users: [
    { id:1, name:'Sarah Johnson', email:'sarah@company.com',   role:'Sales Manager',     status:'Active',   deals:14, joined:'2022-03-10' },
    { id:2, name:'Michael Chen',  email:'michael@company.com', role:'Account Executive', status:'Active',   deals:9,  joined:'2022-07-22' },
    { id:3, name:'Emma Davis',    email:'emma@company.com',    role:'BDR',               status:'Active',   deals:6,  joined:'2023-01-05' },
    { id:4, name:'James Wilson',  email:'james@company.com',   role:'Account Executive', status:'Away',     deals:11, joined:'2021-11-15' },
    { id:5, name:'Priya Patel',   email:'priya@company.com',   role:'Sales Ops',         status:'Active',   deals:0,  joined:'2023-04-18' },
    { id:6, name:'Carlos Ruiz',   email:'carlos@company.com',  role:'BDR',               status:'Inactive', deals:3,  joined:'2023-08-01' },
  ],
};

/* ─── AUTH CONTEXT ───────────────────────────────────── */
const AuthContext = createContext(null);
const AuthProvider = ({ children }) => {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('fd_user')); } catch { return null; }
  });

  const login = (email, password) => {
    const found = DEMO_USERS.find(u => u.email === email && u.password === password);
    if (!found) throw new Error('Invalid email or password');
    const { password: _, ...safe } = found;
    setUser(safe);
    localStorage.setItem('fd_user', JSON.stringify(safe));
    return safe;
  };

  const logout = () => {
    setUser(null);
    localStorage.removeItem('fd_user');
  };

  return (
    <AuthContext.Provider value={{ user, login, logout, isAuthenticated: !!user }}>
      {children}
    </AuthContext.Provider>
  );
};
const useAuth = () => useContext(AuthContext);

/* ─── BADGE ──────────────────────────────────────────── */
const BADGE_COLORS = {
  'New':'#6366F1','Qualified':'#0EA5E9','Proposal':'#F59E0B','Negotiation':'#EC4899','Closed Won':'#10B981',
  'High':'#F87171','Medium':'#FBBF24','Low':'#6EE7B7',
  'In Progress':'#6366F1','Todo':'#71717A','Completed':'#10B981',
  'Active':'#10B981','Away':'#F59E0B','Inactive':'#F87171',
};
const Badge = ({ status }) => (
  <span style={{
    padding:'3px 10px', borderRadius:'20px', fontSize:'11.5px', fontWeight:600,
    color: BADGE_COLORS[status] || '#aaa',
    background: (BADGE_COLORS[status] || '#aaa') + '22',
    display:'inline-block', whiteSpace:'nowrap',
  }}>{status}</span>
);

/* ─── LOGIN PAGE ─────────────────────────────────────── */
const LoginPage = () => {
  const { login } = useAuth();
  const [email, setEmail]       = useState('');
  const [password, setPassword] = useState('');
  const [errors, setErrors]     = useState({});
  const [apiErr, setApiErr]     = useState('');
  const [loading, setLoading]   = useState(false);
  const [showPw, setShowPw]     = useState(false);

  const validate = () => {
    const e = {};
    if (!email.trim()) e.email = 'Email is required';
    else if (!/^\S+@\S+\.\S+$/.test(email)) e.email = 'Enter a valid email address';
    if (!password) e.password = 'Password is required';
    return e;
  };

  const handleSubmit = async (ev) => {
    ev.preventDefault();
    setApiErr('');
    const e = validate();
    if (Object.keys(e).length) { setErrors(e); return; }
    setErrors({});
    setLoading(true);
    await new Promise(r => setTimeout(r, 600)); // simulate network
    try { login(email, password); }
    catch(err) { setApiErr(err.message); }
    finally { setLoading(false); }
  };

  const fill = (type) => {
    const m = { admin:['admin@demo.com','password123'], user:['user@demo.com','password123'] };
    setEmail(m[type][0]); setPassword(m[type][1]); setErrors({}); setApiErr('');
  };

  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      background:'#09090B',position:'relative',overflow:'hidden',padding:'24px'}}>
      {/* bg glow */}
      <div style={{position:'absolute',top:'-20%',left:'50%',transform:'translateX(-50%)',
        width:'700px',height:'500px',
        background:'radial-gradient(ellipse,rgba(99,102,241,.13) 0%,transparent 70%)',
        pointerEvents:'none'}}/>
      {/* grid */}
      <div style={{position:'absolute',inset:0,
        backgroundImage:'linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px)',
        backgroundSize:'40px 40px',pointerEvents:'none'}}/>

      <div style={{background:'rgba(24,24,27,.92)',border:'1px solid rgba(255,255,255,.08)',
        borderRadius:'20px',padding:'40px',width:'100%',maxWidth:'430px',
        backdropFilter:'blur(20px)',boxShadow:'0 25px 60px rgba(0,0,0,.5)',
        position:'relative',zIndex:1,animation:'fadeIn .4s ease'}}>

        {/* Logo */}
        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'32px'}}>
          <svg width="30" height="30" viewBox="0 0 30 30"><rect width="30" height="30" rx="8" fill="#6366F1"/><path d="M7 15L13 21L23 9" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <span style={{fontSize:'18px',fontWeight:700,color:'#F4F4F5',letterSpacing:'-.3px'}}>FlowDesk</span>
        </div>

        <h1 style={{fontSize:'26px',fontWeight:700,color:'#F4F4F5',marginBottom:'6px',letterSpacing:'-.5px'}}>Welcome back</h1>
        <p style={{fontSize:'14px',color:'#71717A',marginBottom:'28px'}}>Sign in to your workspace</p>

        {apiErr && (
          <div style={{background:'rgba(248,113,113,.1)',border:'1px solid rgba(248,113,113,.2)',
            borderRadius:'10px',padding:'11px 14px',color:'#FCA5A5',fontSize:'13.5px',
            marginBottom:'20px',display:'flex',alignItems:'center',gap:'8px'}}>
            ⚠️ {apiErr}
          </div>
        )}

        <form onSubmit={handleSubmit} noValidate>
          {/* Email */}
          <div style={{marginBottom:'18px'}}>
            <label style={{display:'block',fontSize:'13px',fontWeight:500,color:'#A1A1AA',marginBottom:'6px'}}>Email address</label>
            <input type="email" value={email}
              onChange={e=>{setEmail(e.target.value);setErrors(p=>({...p,email:''}));}}
              placeholder="you@company.com"
              style={{width:'100%',padding:'11px 14px',
                background:'rgba(39,39,42,.8)',
                border:`1px solid ${errors.email?'rgba(248,113,113,.5)':'rgba(255,255,255,.1)'}`,
                borderRadius:'10px',color:'#F4F4F5',fontSize:'14px',fontFamily:'inherit',
                transition:'border-color .2s'}}/>
            {errors.email && <span style={{color:'#F87171',fontSize:'12px',marginTop:'5px',display:'block'}}>{errors.email}</span>}
          </div>

          {/* Password */}
          <div style={{marginBottom:'22px'}}>
            <label style={{display:'block',fontSize:'13px',fontWeight:500,color:'#A1A1AA',marginBottom:'6px'}}>Password</label>
            <div style={{position:'relative'}}>
              <input type={showPw?'text':'password'} value={password}
                onChange={e=>{setPassword(e.target.value);setErrors(p=>({...p,password:''}));}}
                placeholder="Enter your password"
                style={{width:'100%',padding:'11px 44px 11px 14px',
                  background:'rgba(39,39,42,.8)',
                  border:`1px solid ${errors.password?'rgba(248,113,113,.5)':'rgba(255,255,255,.1)'}`,
                  borderRadius:'10px',color:'#F4F4F5',fontSize:'14px',fontFamily:'inherit'}}/>
              <button type="button" onClick={()=>setShowPw(v=>!v)}
                style={{position:'absolute',right:'12px',top:'50%',transform:'translateY(-50%)',
                  background:'none',border:'none',fontSize:'16px',color:'#71717A',padding:0}}>
                {showPw?'🙈':'👁️'}
              </button>
            </div>
            {errors.password && <span style={{color:'#F87171',fontSize:'12px',marginTop:'5px',display:'block'}}>{errors.password}</span>}
          </div>

          <button type="submit" disabled={loading}
            style={{width:'100%',padding:'12px',
              background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
              border:'none',borderRadius:'10px',color:'white',fontSize:'15px',
              fontWeight:600,fontFamily:'inherit',letterSpacing:'-.2px',
              display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',
              opacity:loading?.7:1,transition:'opacity .2s'}}>
            {loading
              ? <span style={{width:'18px',height:'18px',border:'2px solid rgba(255,255,255,.3)',
                  borderTopColor:'white',borderRadius:'50%',display:'inline-block',
                  animation:'spin .7s linear infinite'}}/>
              : 'Sign In →'}
          </button>
        </form>

        {/* Demo accounts */}
        <div style={{margin:'24px 0 14px',textAlign:'center'}}>
          <span style={{fontSize:'12px',color:'#3F3F46'}}>── Quick demo access ──</span>
        </div>
        <div style={{display:'flex',gap:'10px',marginBottom:'14px'}}>
          {[['admin','Admin','#6366F1'],['user','User','#0EA5E9']].map(([t,l,c])=>(
            <button key={t} onClick={()=>fill(t)}
              style={{flex:1,padding:'9px 12px',background:'rgba(39,39,42,.5)',
                border:'1px solid rgba(255,255,255,.08)',borderRadius:'8px',
                color:'#A1A1AA',fontSize:'12px',fontFamily:'inherit',
                display:'flex',alignItems:'center',gap:'7px'}}>
              <span style={{background:c,color:'white',borderRadius:'4px',
                padding:'2px 6px',fontSize:'10px',fontWeight:700}}>{l}</span>
              {t}@demo.com
            </button>
          ))}
        </div>
        <p style={{textAlign:'center',color:'#3F3F46',fontSize:'12px'}}>
          Password: <code style={{background:'rgba(99,102,241,.2)',color:'#A78BFA',
            padding:'1px 6px',borderRadius:'4px',fontFamily:'monospace'}}>password123</code>
        </p>
      </div>
    </div>
  );
};

/* ─── STAT CARD ──────────────────────────────────────── */
const StatCard = ({ icon, label, value, color }) => (
  <div style={{background:'rgba(24,24,27,.8)',border:'1px solid rgba(255,255,255,.07)',
    borderRadius:'14px',padding:'20px',display:'flex',alignItems:'center',gap:'16px'}}>
    <div style={{width:'48px',height:'48px',borderRadius:'12px',background:color+'22',
      display:'flex',alignItems:'center',justifyContent:'center',fontSize:'22px',flexShrink:0}}>
      {icon}
    </div>
    <div>
      <div style={{fontSize:'22px',fontWeight:700,color:'#F4F4F5',letterSpacing:'-.5px'}}>{value}</div>
      <div style={{fontSize:'12px',color:'#71717A',marginTop:'2px'}}>{label}</div>
    </div>
  </div>
);

/* ─── DASHBOARD PAGE ─────────────────────────────────── */
const DashboardPage = () => {
  const { user, logout } = useAuth();
  const [tab, setTab] = useState('leads');
  const data = DASHBOARD_DATA;
  const initials = user?.name?.split(' ').map(n=>n[0]).join('').toUpperCase()||'U';

  const tabs = [
    { id:'leads', label:'Leads',   icon:'🎯', count: data.leads.length },
    { id:'tasks', label:'Tasks',   icon:'✅', count: data.tasks.length },
    { id:'users', label:'Team',    icon:'👥', count: data.users.length },
  ];

  const NAV = [
    { icon:'📊', label:'Dashboard', active:true },
    { icon:'🎯', label:'Leads' },
    { icon:'✅', label:'Tasks' },
    { icon:'👥', label:'Team' },
    { icon:'⚙️', label:'Settings' },
  ];

  return (
    <div style={{display:'flex',minHeight:'100vh',background:'#09090B',
      fontFamily:"'DM Sans','Segoe UI',sans-serif",animation:'fadeIn .3s ease'}}>

      {/* ── Sidebar ── */}
      <aside style={{width:'220px',background:'rgba(15,15,17,.98)',
        borderRight:'1px solid rgba(255,255,255,.06)',
        display:'flex',flexDirection:'column',padding:'22px 14px',flexShrink:0}}>

        <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'34px',paddingLeft:'6px'}}>
          <svg width="26" height="26" viewBox="0 0 30 30"><rect width="30" height="30" rx="8" fill="#6366F1"/><path d="M7 15L13 21L23 9" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <span style={{fontSize:'17px',fontWeight:700,color:'#F4F4F5',letterSpacing:'-.3px'}}>FlowDesk</span>
        </div>

        <nav style={{flex:1,display:'flex',flexDirection:'column',gap:'3px'}}>
          {NAV.map(item=>(
            <div key={item.label}
              style={{display:'flex',alignItems:'center',gap:'10px',padding:'9px 10px',
                borderRadius:'8px',fontSize:'13.5px',cursor:'pointer',
                color: item.active?'#A5B4FC':'#71717A',
                background: item.active?'rgba(99,102,241,.15)':'transparent',
                transition:'all .15s'}}>
              <span>{item.icon}</span><span>{item.label}</span>
            </div>
          ))}
        </nav>

        {/* user footer */}
        <div style={{display:'flex',alignItems:'center',gap:'10px',
          paddingTop:'16px',borderTop:'1px solid rgba(255,255,255,.06)',marginTop:'16px'}}>
          <div style={{width:'32px',height:'32px',borderRadius:'8px',flexShrink:0,
            background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
            display:'flex',alignItems:'center',justifyContent:'center',
            color:'white',fontSize:'12px',fontWeight:700}}>{initials}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:'13px',fontWeight:600,color:'#E4E4E7',
              whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{user?.name}</div>
            <div style={{fontSize:'11px',color:'#52525B',textTransform:'capitalize'}}>{user?.role}</div>
          </div>
          <button onClick={logout} title="Logout"
            style={{background:'none',border:'none',color:'#52525B',fontSize:'16px',padding:'4px',borderRadius:'4px'}}>↪</button>
        </div>
      </aside>

      {/* ── Main ── */}
      <main style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {/* Header */}
        <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding:'22px 30px',borderBottom:'1px solid rgba(255,255,255,.06)',
          background:'rgba(12,12,14,.85)',backdropFilter:'blur(12px)'}}>
          <div>
            <h1 style={{fontSize:'22px',fontWeight:700,color:'#F4F4F5',letterSpacing:'-.4px'}}>Dashboard</h1>
            <p style={{fontSize:'13px',color:'#52525B',marginTop:'2px'}}>
              Welcome back, {user?.name?.split(' ')[0]} 👋
            </p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:'14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:'8px',
              background:'rgba(39,39,42,.5)',border:'1px solid rgba(255,255,255,.08)',
              borderRadius:'8px',padding:'8px 14px'}}>
              <span style={{color:'#52525B'}}>🔍</span>
              <input placeholder="Search..." style={{background:'none',border:'none',outline:'none',
                color:'#A1A1AA',fontSize:'13px',width:'130px',fontFamily:'inherit'}}/>
            </div>
            <div style={{width:'36px',height:'36px',borderRadius:'10px',
              background:'linear-gradient(135deg,#6366F1,#8B5CF6)',
              display:'flex',alignItems:'center',justifyContent:'center',
              color:'white',fontSize:'13px',fontWeight:700,cursor:'pointer'}}>{initials}</div>
          </div>
        </header>

        <div style={{flex:1,overflowY:'auto',padding:'24px 30px'}}>

          {/* Stats grid */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'14px',marginBottom:'22px'}}>
            <StatCard icon="🎯" label="Total Leads"   value={data.stats.totalLeads}   color="#6366F1"/>
            <StatCard icon="✅" label="Open Tasks"    value={data.stats.openTasks}    color="#0EA5E9"/>
            <StatCard icon="👥" label="Active Users"  value={data.stats.activeUsers}  color="#10B981"/>
            <StatCard icon="💰" label="Total Revenue" value={data.stats.totalRevenue} color="#F59E0B"/>
          </div>

          {/* Panel */}
          <div style={{background:'rgba(18,18,20,.8)',border:'1px solid rgba(255,255,255,.07)',
            borderRadius:'16px',overflow:'hidden'}}>

            {/* Tab bar */}
            <div style={{display:'flex',gap:'4px',padding:'12px 14px',
              borderBottom:'1px solid rgba(255,255,255,.06)'}}>
              {tabs.map(t=>(
                <button key={t.id} onClick={()=>setTab(t.id)}
                  style={{padding:'7px 16px',borderRadius:'8px',border:'none',fontFamily:'inherit',
                    fontSize:'13px',fontWeight:500,display:'flex',alignItems:'center',gap:'6px',
                    background: tab===t.id?'rgba(99,102,241,.15)':'none',
                    color: tab===t.id?'#A5B4FC':'#71717A',transition:'all .15s'}}>
                  {t.icon} {t.label}

                    padding:'1px 7px',fontSize:'11px',color:'#52525B'}}>{t.count}</span>
                </button>
              ))}
            </div>

            {/* Tables */}
            <div style={{overflowX:'auto'}}>

              {/* LEADS */}
              {tab==='leads' && (
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr>
                      {['Company','Email','Status','Value','Source','Date'].map(h=>(
                        <th key={h} style={{padding:'11px 16px',textAlign:'left',fontSize:'11px',
                          fontWeight:600,color:'#52525B',textTransform:'uppercase',letterSpacing:'.5px',
                          background:'rgba(24,24,27,.6)',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {data.leads.map(row=>(
                      <tr key={row.id} style={{borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                        <td style={{padding:'13px 16px',fontWeight:600,color:'#F4F4F5',whiteSpace:'nowrap'}}>{row.name}</td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px'}}>{row.email}</td>
                        <td style={{padding:'13px 16px'}}><Badge status={row.status}/></td>
                        <td style={{padding:'13px 16px',color:'#10B981',fontWeight:600}}>{row.value}</td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px'}}>{row.source}</td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px'}}>{row.date}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

              {/* TASKS */}
              {tab==='tasks' && (
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr>
                      {['Task','Assignee','Priority','Status','Due Date'].map(h=>(
                        <th key={h} style={{padding:'11px 16px',textAlign:'left',fontSize:'11px',
                          fontWeight:600,color:'#52525B',textTransform:'uppercase',letterSpacing:'.5px',
                          background:'rgba(24,24,27,.6)',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {data.tasks.map(row=>(
                      <tr key={row.id} style={{borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                        <td style={{padding:'13px 16px',color:'#E4E4E7',fontSize:'13px',fontWeight:500}}>{row.title}</td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px',whiteSpace:'nowrap'}}>{row.assignee}</td>
                        <td style={{padding:'13px 16px'}}><Badge status={row.priority}/></td>
                        <td style={{padding:'13px 16px'}}><Badge status={row.status}/></td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px'}}>{row.due}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

              {/* USERS */}
              {tab==='users' && (
                <table style={{width:'100%',borderCollapse:'collapse'}}>
                  <thead>
                    <tr>
                      {['Name','Email','Role','Status','Deals','Joined'].map(h=>(
                        <th key={h} style={{padding:'11px 16px',textAlign:'left',fontSize:'11px',
                          fontWeight:600,color:'#52525B',textTransform:'uppercase',letterSpacing:'.5px',
                          background:'rgba(24,24,27,.6)',whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {data.users.map(row=>(
                      <tr key={row.id} style={{borderBottom:'1px solid rgba(255,255,255,.04)'}}>
                        <td style={{padding:'13px 16px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                            <div style={{width:'30px',height:'30px',borderRadius:'8px',flexShrink:0,
                              background:'rgba(99,102,241,.2)',display:'flex',alignItems:'center',
                              justifyContent:'center',color:'#A5B4FC',fontSize:'11px',fontWeight:700}}>
                              {row.name.split(' ').map(n=>n[0]).join('')}
                            </div>
                            <span style={{fontWeight:600,color:'#F4F4F5',fontSize:'13px',whiteSpace:'nowrap'}}>{row.name}</span>
                          </div>
                        </td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px'}}>{row.email}</td>
                        <td style={{padding:'13px 16px',color:'#A1A1AA',fontSize:'13px'}}>{row.role}</td>
                        <td style={{padding:'13px 16px'}}><Badge status={row.status}/></td>
                        <td style={{padding:'13px 16px',color:'#A1A1AA',fontSize:'13px',textAlign:'center'}}>{row.deals}</td>
                        <td style={{padding:'13px 16px',color:'#71717A',fontSize:'13px'}}>{row.joined}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}

            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

/* ─── APP ROOT ───────────────────────────────────────── */
const App = () => {
  const { isAuthenticated } = useAuth();
  return isAuthenticated ? <DashboardPage /> : <LoginPage />;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(
  <AuthProvider>
    <App />
  </AuthProvider>
);
</script>
</body>
</html>
